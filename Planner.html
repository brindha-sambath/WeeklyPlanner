<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Planner</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f13;
  --surface: #17171d;
  --surface2: #1e1e26;
  --surface3: #25252f;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e8f0;
  --text2: #8888a0;
  --text3: #55556a;
  --accent: #6c63ff;
  --accent2: #8b85ff;
  --hour-h: 64px;
  --sidebar-w: 280px;
  --time-w: 52px;
  --radius: 10px;
  --radius-sm: 6px;
}

/* Light chrome for everything except the calendar grid itself — topbar,
   sidebar, modals, habit panel and toasts go light theme for readability,
   tinted toward the existing accent hue, while .cal-area/.day-headers keep
   the original dark palette inherited from :root. */
.topbar, .sidebar, .modal, .habit-panel, .toast-container {
  --surface: #ffffff;
  --surface2: #eef0f7;
  --surface3: #e1e4f0;
  --border: rgba(35,35,70,0.10);
  --border2: rgba(35,35,70,0.18);
  --text: #1c1c2a;
  --text2: #4d4d63;
  --text3: #74748c;
}

body {
  font-family: 'Times New Roman', Times, serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* TOPBAR */
.topbar {
  display: flex;
  align-items: center;
  padding: 0 20px;
  height: 54px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  gap: 16px;
  z-index: 100;
}
.logo {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
.nav-week {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: 20px;
}
.nav-btn {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text2);
  width: 28px; height: 28px;
  border-radius: 6px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
}
.nav-btn:hover { background: var(--surface3); color: var(--text); }
.week-label { font-size: 13px; font-weight: 500; color: var(--text); min-width: 160px; text-align: center; }
.today-btn {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text2);
  padding: 4px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  transition: all 0.15s;
}
.today-btn:hover { background: var(--surface3); color: var(--text); }
.spacer { flex: 1; }
.view-tabs { display: flex; gap: 2px; background: var(--surface2); border-radius: 7px; padding: 2px; }
.view-tab {
  padding: 4px 12px; border-radius: 5px; font-size: 12px; font-weight: 500;
  cursor: pointer; color: var(--text2); border: none; background: none;
  font-family: inherit; transition: all 0.15s;
}
.view-tab.active { background: var(--surface3); color: var(--text); }
.add-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 7px; padding: 6px 14px;
  font-size: 13px; font-weight: 500; font-family: inherit;
  cursor: pointer; transition: opacity 0.15s;
}
.add-btn:hover { opacity: 0.88; }
.habit-btn {
  background: none; border: 1px solid var(--border2); color: var(--text2);
  padding: 6px 14px; border-radius: 7px; font-size: 13px; font-weight: 500;
  font-family: inherit; cursor: pointer; transition: all 0.15s;
}
.habit-btn:hover { background: var(--surface3); color: var(--text); }

/* MAIN LAYOUT */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w);
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
.sidebar-title {
  font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text3);
  margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
}
.sidebar-title button {
  background: none; border: none; color: var(--text3); cursor: pointer;
  font-size: 16px; line-height: 1; padding: 0; transition: color 0.15s;
}
.sidebar-title button:hover { color: var(--text2); }

/* MINI CALENDAR */
.mini-cal { user-select: none; }
.mini-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.mini-cal-header span { font-size: 12px; font-weight: 500; }
.mini-cal-header button {
  background: none; border: none; color: var(--text2); cursor: pointer;
  font-size: 14px; padding: 2px 4px;
}
.mini-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
.mini-cal-day-name { font-size: 9px; color: var(--text3); text-align: center; padding: 2px 0; font-weight: 600; }
.mini-cal-day {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  font-size: 11px; cursor: pointer; border-radius: 4px;
  color: var(--text2); transition: all 0.12s;
}
.mini-cal-day:hover { background: var(--surface3); color: var(--text); }
.mini-cal-day.today { background: var(--accent); color: #fff; font-weight: 600; }
.mini-cal-day.selected { outline: 1px solid var(--accent2); color: var(--text); }
.mini-cal-day.other-month { color: var(--text3); }

/* CATEGORIES */
.category-list { display: flex; flex-direction: column; gap: 4px; }
.category-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: var(--radius-sm);
  cursor: pointer; transition: background 0.12s;
}
.category-item:hover { background: var(--surface2); }
.cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cat-name { font-size: 13px; flex: 1; }
.cat-count { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
.cat-delete { display: none; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 0; }
.category-item:hover .cat-delete { display: block; }
.cat-add-form { display: flex; gap: 6px; margin-top: 8px; }
.cat-add-form input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); border-radius: 5px; padding: 5px 8px; font-size: 12px;
  font-family: inherit; outline: none;
}
.cat-add-form input::placeholder { color: var(--text3); }
.cat-add-form input:focus { border-color: var(--accent); }
.cat-color-pick { width: 28px; height: 28px; padding: 2px; border-radius: 5px; border: 1px solid var(--border2); cursor: pointer; background: var(--surface2); }
.cat-add-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: 5px; padding: 0 10px; font-size: 12px;
  cursor: pointer; font-family: inherit; font-weight: 500;
}

/* TODO LIST */
.todo-list { display: flex; flex-direction: column; gap: 3px; }
.todo-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 5px 6px; border-radius: 5px; transition: background 0.12s; group: true;
}
.todo-item:hover { background: var(--surface2); }
.todo-cb {
  width: 14px; height: 14px; border-radius: 3px;
  border: 1.5px solid var(--border2); cursor: pointer;
  flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; background: none;
}
.todo-cb.checked { background: var(--accent); border-color: var(--accent); }
.todo-cb.checked::after { content: '✓'; color: #fff; font-size: 9px; font-weight: 700; }
.todo-text { font-size: 13px; flex: 1; line-height: 1.4; cursor: text; }
.todo-text.done { text-decoration: line-through; color: var(--text3); }
.todo-del { display: none; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; padding: 0; line-height: 1; }
.todo-item:hover .todo-del { display: block; }
.todo-add {
  display: flex; gap: 6px; margin-top: 8px;
}
.todo-add input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); border-radius: 5px; padding: 6px 8px; font-size: 12px;
  font-family: inherit; outline: none;
}
.todo-add input::placeholder { color: var(--text3); }
.todo-add input:focus { border-color: var(--accent); }
.todo-add button {
  background: var(--surface3); border: 1px solid var(--border2);
  color: var(--text2); border-radius: 5px; padding: 0 10px;
  font-size: 18px; cursor: pointer; line-height: 1; transition: all 0.12s;
}
.todo-add button:hover { color: var(--text); background: var(--surface2); }

/* UNSCHEDULED / OVERDUE */
.unscheduled-list { display: flex; flex-direction: column; gap: 4px; }
.unscheduled-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 8px; border-radius: 6px;
  background: var(--surface2); border: 1px solid var(--border);
  font-size: 12px; cursor: grab; transition: all 0.12s;
}
.unscheduled-chip:hover { border-color: var(--border2); }
.unscheduled-chip:active { cursor: grabbing; }
.chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.chip-label { flex: 1; }
.chip-reschedule {
  font-size: 10px; color: var(--accent);
  cursor: pointer; background: none; border: none; font-family: inherit; padding: 0;
}

/* CALENDAR AREA */
.cal-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* DAY HEADERS */
.day-headers {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.time-gutter-header { width: var(--time-w); flex-shrink: 0; }
.day-header-col {
  flex: 1;
  text-align: center;
  padding: 10px 4px;
  border-left: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.12s;
}
.day-header-col:hover { background: var(--surface2); }
.day-header-col.today { background: rgba(108, 99, 255, 0.08); }
.day-name-sm { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text3); }
.day-num {
  font-size: 20px; font-weight: 300; color: var(--text); margin-top: 2px;
  width: 36px; height: 36px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; margin: 2px auto 0;
}
.day-header-col.today .day-num { background: var(--accent); color: #fff; font-weight: 500; }

/* SCROLLABLE TIME GRID */
.time-grid-wrap {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
}
.time-grid-wrap::-webkit-scrollbar { width: 6px; }
.time-grid-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.time-grid {
  display: flex;
  min-height: calc(var(--hour-h) * 24);
  position: relative;
}
.time-gutter {
  width: var(--time-w);
  flex-shrink: 0;
  position: sticky;
  left: 0;
  z-index: 2;
}
.time-label {
  height: var(--hour-h);
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding: 0 8px 0 0;
  padding-top: 2px;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text3);
  letter-spacing: -0.02em;
}
.time-label:first-child { visibility: hidden; }

.days-columns {
  flex: 1;
  display: flex;
  position: relative;
}
.day-col {
  flex: 1;
  border-left: 1px solid var(--border);
  position: relative;
}
.hour-line {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: var(--border);
}
.half-line {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: rgba(255,255,255,0.03);
}

/* CURRENT TIME */
.now-line {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: var(--accent2);
  z-index: 5;
  pointer-events: none;
}
.now-line::before {
  content: '';
  position: absolute;
  left: -4px; top: -4px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--accent2);
}

/* EVENTS */
.event-block {
  position: absolute;
  left: 3px; right: 3px;
  border-radius: 7px;
  padding: 5px 8px;
  font-size: 12px;
  cursor: grab;
  z-index: 3;
  overflow: hidden;
  transition: box-shadow 0.15s, opacity 0.15s;
  border-left: 3px solid transparent;
  user-select: none;
}
.event-block:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.4); z-index: 10; }
.event-block.dragging { opacity: 0.4; cursor: grabbing; }
.event-block.drag-clone { opacity: 0.85; box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 1000; position: fixed; cursor: grabbing; pointer-events: none; }
.event-top { display: flex; align-items: flex-start; gap: 5px; }
.event-cb {
  width: 12px; height: 12px; border-radius: 3px;
  border: 1.5px solid rgba(255,255,255,0.35); cursor: pointer;
  flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; background: rgba(0,0,0,0.15);
}
.event-cb:hover { border-color: #22c97a; }
.event-cb.checked { background: #22c97a; border-color: #22c97a; }
.event-cb.checked::after { content: '✓'; color: #fff; font-size: 8px; font-weight: 700; }
.event-title { font-weight: 500; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.event-time { font-size: 10px; opacity: 0.75; margin-top: 1px; font-family: 'JetBrains Mono', monospace; }
.event-actions {
  display: none; position: absolute; top: 4px; right: 4px;
  gap: 3px;
}
.event-block:hover .event-actions { display: flex; }
.ev-btn {
  background: rgba(0,0,0,0.3); border: none; color: #fff;
  width: 20px; height: 20px; border-radius: 4px;
  font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* RESIZE HANDLE */
.resize-handle {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 8px; cursor: ns-resize; z-index: 4;
  display: flex; align-items: center; justify-content: center; opacity: 0;
  transition: opacity 0.15s;
}
.event-block:hover .resize-handle { opacity: 1; }
.resize-handle::before {
  content: ''; width: 24px; height: 3px;
  background: rgba(255,255,255,0.4); border-radius: 2px;
}

/* DROP ZONES */
.day-col.drag-over { background: rgba(108, 99, 255, 0.06); }

/* MODAL */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  width: 460px;
  max-width: 95vw;
  padding: 24px;
  animation: modal-in 0.2s ease;
}
@keyframes modal-in {
  from { opacity: 0; transform: translateY(12px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
}
.modal-title { font-size: 16px; font-weight: 600; }
.modal-close {
  background: none; border: none; color: var(--text2);
  font-size: 20px; cursor: pointer; padding: 0; line-height: 1; transition: color 0.12s;
}
.modal-close:hover { color: var(--text); }
.form-row { margin-bottom: 14px; }
.form-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
.form-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); border-radius: 7px; padding: 9px 12px;
  font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--accent); }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.cat-select {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); border-radius: 7px; padding: 9px 12px;
  font-size: 14px; font-family: inherit; outline: none; cursor: pointer;
  appearance: none;
}
.cat-select:focus { border-color: var(--accent); }
.form-check { display: flex; align-items: center; gap: 8px; }
.form-check input { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
.form-check label { font-size: 13px; color: var(--text2); cursor: pointer; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.btn-secondary {
  background: none; border: 1px solid var(--border2); color: var(--text2);
  padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 500;
  font-family: inherit; cursor: pointer; transition: all 0.12s;
}
.btn-secondary:hover { background: var(--surface2); color: var(--text); }
.btn-primary {
  background: var(--accent); color: #fff; border: none;
  padding: 8px 20px; border-radius: 7px; font-size: 13px; font-weight: 500;
  font-family: inherit; cursor: pointer; transition: opacity 0.12s;
}
.btn-primary:hover { opacity: 0.88; }
.btn-danger {
  background: rgba(255,80,80,0.15); color: #ff6b6b; border: 1px solid rgba(255,80,80,0.2);
  padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 500;
  font-family: inherit; cursor: pointer; transition: all 0.12s; margin-right: auto;
}
.btn-danger:hover { background: rgba(255,80,80,0.25); }

/* TOAST */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 500; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--surface3); border: 1px solid var(--border2);
  padding: 10px 16px; border-radius: 8px; font-size: 13px;
  animation: toast-in 0.2s ease;
  display: flex; align-items: center; gap: 8px;
}
@keyframes toast-in { from { opacity: 0; transform: translateX(20px); } }
.toast-dot { width: 6px; height: 6px; border-radius: 50%; }

/* REMINDER BADGE */
.reminder-badge {
  position: absolute; top: -3px; right: -3px;
  width: 14px; height: 14px; border-radius: 50%;
  background: #ffaa33; border: 2px solid var(--surface);
  font-size: 7px; display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700;
}

/* HABIT PANEL */
.habit-panel-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 250; display: none;
}
.habit-panel-bg.open { display: block; }
.habit-panel {
  position: fixed; top: 0; right: 0; height: 100vh; width: 380px; max-width: 92vw;
  background: var(--surface); border-left: 1px solid var(--border2);
  z-index: 260; transform: translateX(100%); transition: transform 0.25s ease;
  display: flex; flex-direction: column; overflow-y: auto;
}
.habit-panel.open { transform: translateX(0); }
.habit-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.habit-panel-title { font-size: 15px; font-weight: 600; }
.habit-panel-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 24px; }
.habit-section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text3); margin-bottom: 10px;
}
.habit-week-nav { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
.habit-week-label { font-size: 12px; font-weight: 500; color: var(--text); flex: 1; text-align: center; }
.habit-reset-btn {
  background: none; border: 1px solid var(--border); color: var(--text3);
  padding: 7px 12px; border-radius: 7px; font-size: 11px;
  font-family: inherit; cursor: pointer; transition: all 0.15s; align-self: flex-start;
}
.habit-reset-btn:hover { border-color: rgba(255,80,80,0.4); color: #ff6b6b; }

.habit-grid-wrap { overflow-x: auto; }
.habit-grid { width: 100%; border-collapse: collapse; }
.habit-grid th, .habit-grid td { text-align: center; padding: 5px 3px; }
.habit-grid th { color: var(--text3); font-weight: 500; font-size: 10px; line-height: 1.4; }
.habit-grid th.habit-name-col, .habit-grid td.habit-name-col {
  text-align: left; font-size: 12px; color: var(--text); padding-right: 8px; white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
}
.habit-grid td.today-col, .habit-grid th.today-col { background: rgba(108,99,255,0.08); border-radius: 4px; }
.habit-day-cb {
  width: 16px; height: 16px; border-radius: 4px; margin: 0 auto;
  border: 1.5px solid var(--border2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; background: none;
}
.habit-day-cb:hover { border-color: #22c97a; }
.habit-day-cb.checked { background: #22c97a; border-color: #22c97a; }
.habit-day-cb.checked::after { content: '✓'; color: #fff; font-size: 10px; font-weight: 700; }
.habit-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 12px; padding: 0; opacity: 0; transition: opacity 0.12s; }
.habit-row:hover .habit-del { opacity: 1; }

.habit-add-form { display: flex; gap: 6px; margin-top: 10px; }
.habit-add-form input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); border-radius: 5px; padding: 6px 8px; font-size: 12px;
  font-family: inherit; outline: none;
}
.habit-add-form input::placeholder { color: var(--text3); }
.habit-add-form input:focus { border-color: var(--accent); }
.habit-add-form button {
  background: var(--surface3); border: 1px solid var(--border2); color: var(--text2);
  border-radius: 5px; padding: 0 10px; font-size: 16px; cursor: pointer; transition: all 0.12s;
}
.habit-add-form button:hover { color: var(--text); background: var(--surface2); }

.habit-chart { display: flex; flex-direction: column; gap: 10px; }
.habit-chart-row { display: flex; align-items: center; gap: 8px; }
.habit-chart-label { width: 100px; font-size: 12px; color: var(--text2); flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.habit-chart-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 5px; overflow: hidden; }
.habit-chart-fill { height: 100%; border-radius: 5px; transition: width 0.3s ease; }
.habit-chart-pct { width: 34px; text-align: right; font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }

.habit-month-nav { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
.habit-month-label { font-size: 12px; font-weight: 500; color: var(--text); flex: 1; text-align: center; }
.habit-col-chart { display: flex; align-items: flex-end; gap: 10px; padding: 4px 2px; }
.habit-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 0; }
.habit-col-track {
  position: relative; width: 100%; max-width: 36px; height: 100px;
  background: var(--surface2); border-radius: 5px; overflow: hidden;
}
.habit-col-fill { position: absolute; left: 0; right: 0; bottom: 0; border-radius: 5px 5px 0 0; transition: height 0.3s ease; }
.habit-col-pct { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
.habit-col-label {
  font-size: 10px; color: var(--text2); text-align: center; line-height: 1.3;
  max-width: 64px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>

<script>
// ─── STATE ──────────────────────────────────────────────────────────────────
let state = {
  weekOffset: 0,
  view: 'week',
  dayViewDate: today(),
  events: [],
  categories: [
    { id: 'c1', name: 'Work', color: '#6c63ff' },
    { id: 'c2', name: 'Health', color: '#22c97a' },
    { id: 'c3', name: 'Personal', color: '#f4a03c' },
    { id: 'c4', name: 'Social', color: '#e05c99' },
    { id: 'c5', name: 'Reading', color: '#4ec9b0' },
  ],
  todos: [],
  habits: [],
  habitLog: {}, // dateStr -> { habitId: true/false }
  habitWeekOffset: 0,
  habitMonthOffset: 0,
  editingEventId: null,
  miniCalDate: new Date(),
};

const DEFAULT_HABITS = [
  { id: 'hb1', name: 'Proper sleep', color: '#8b85ff' },
  { id: 'hb2', name: 'Walk 45 mins', color: '#22c97a' },
  { id: 'hb3', name: 'Exercise', color: '#f4a03c' },
  { id: 'hb4', name: 'Healthy Food', color: '#4ec9b0' },
  { id: 'hb5', name: 'Less Stress', color: '#e05c99' },
];

// Persist to data.json via the local server (see server.js)
const DATA_URL = '/api/data';
async function save() {
  const s = { events: state.events, categories: state.categories, todos: state.todos };
  try {
    const res = await fetch(DATA_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(s),
    });
    if (!res.ok) throw new Error(res.statusText);
  } catch (e) {
    toast('Failed to save — is the server running?', '#ff6b6b');
  }
}
async function load() {
  try {
    const res = await fetch(DATA_URL);
    const d = await res.json();
    if (d.events) state.events = d.events;
    if (d.categories) state.categories = d.categories;
    if (d.todos) state.todos = d.todos;
  } catch (e) {
    toast('Failed to load — is the server running?', '#ff6b6b');
  }
}

// Habit tracker persists separately to habits.json so it can be kept for
// months and wiped independently when starting a new year
const HABITS_URL = '/api/habits';
async function saveHabits() {
  try {
    const res = await fetch(HABITS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ habits: state.habits, habitLog: state.habitLog }),
    });
    if (!res.ok) throw new Error(res.statusText);
  } catch (e) {
    toast('Failed to save habits — is the server running?', '#ff6b6b');
  }
}
async function loadHabits() {
  try {
    const res = await fetch(HABITS_URL);
    const d = await res.json();
    if (d.habits) state.habits = d.habits;
    if (d.habitLog) state.habitLog = d.habitLog;
  } catch (e) {
    toast('Failed to load habits — is the server running?', '#ff6b6b');
  }
}

// ─── HELPERS ────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function weekStart(offset=0) {
  const d = new Date();
  const day = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  mon.setHours(0,0,0,0);
  return mon;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtTime(hhmm) {
  const [h,m] = hhmm.split(':').map(Number);
  const ampm = h < 12 ? 'AM' : 'PM';
  return `${h%12||12}:${String(m).padStart(2,'0')} ${ampm}`;
}
function timeToFrac(hhmm) {
  const [h,m] = hhmm.split(':').map(Number);
  return h + m/60;
}
function fracToHhmm(frac) {
  const h = Math.floor(frac);
  const m = Math.round((frac - h) * 60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function catColor(id) {
  const c = state.categories.find(c=>c.id===id);
  return c ? c.color : '#6c63ff';
}
function catName(id) {
  const c = state.categories.find(c=>c.id===id);
  return c ? c.name : '';
}
function today() { return toDateStr(new Date()); }
function isOverdue(ev) {
  if (ev.dateStr < today()) return true;
  if (ev.dateStr === today()) {
    const now = new Date();
    const nowFrac = now.getHours() + now.getMinutes()/60;
    return timeToFrac(ev.endTime) < nowFrac;
  }
  return false;
}

function toast(msg, color='#6c63ff') {
  const tc = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<div class="toast-dot" style="background:${color}"></div>${msg}`;
  tc.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 2500);
}

// ─── CALENDAR GRID ──────────────────────────────────────────────────────────
const HOUR_H = 64;
const TIME_W = 52;

function getWeekDays() {
  const ws = weekStart(state.weekOffset);
  return Array.from({length:7},(_,i)=>addDays(ws,i));
}

function getDisplayDays() {
  if(state.view === 'day') {
    const [y,m,d] = state.dayViewDate.split('-').map(Number);
    return [new Date(y, m-1, d)];
  }
  return getWeekDays();
}

const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function renderDayHeaders() {
  const days = getDisplayDays();
  const hdr = document.getElementById('dayHeaders');
  hdr.innerHTML = `<div class="time-gutter-header" style="width:${TIME_W}px;flex-shrink:0"></div>`;
  days.forEach(d => {
    const isToday = toDateStr(d) === today();
    const div = document.createElement('div');
    div.className = 'day-header-col' + (isToday?' today':'');
    div.dataset.dateStr = toDateStr(d);
    div.innerHTML = `<div class="day-name-sm">${DAY_NAMES[d.getDay()]}</div><div class="day-num">${d.getDate()}</div>`;
    div.addEventListener('click', ()=>{ openAddModal(null, toDateStr(d)); });
    hdr.appendChild(div);
  });
}

function renderTimeGrid() {
  const gutter = document.getElementById('timeGutter');
  gutter.innerHTML = '';
  for(let h=0;h<24;h++){
    const el = document.createElement('div');
    el.className = 'time-label';
    el.style.height = HOUR_H + 'px';
    el.textContent = h===0?'':( h<12?`${h} AM`:(h===12?'12 PM':`${h-12} PM`) );
    gutter.appendChild(el);
  }

  const cols = document.getElementById('daysColumns');
  cols.innerHTML = '';
  const days = getDisplayDays();

  days.forEach(d => {
    const col = document.createElement('div');
    col.className = 'day-col';
    col.dataset.dateStr = toDateStr(d);
    col.style.minHeight = (HOUR_H*24)+'px';

    for(let h=0;h<24;h++){
      const line = document.createElement('div');
      line.className = 'hour-line';
      line.style.top = (h*HOUR_H)+'px';
      col.appendChild(line);
      if(h<23){
        const half = document.createElement('div');
        half.className = 'half-line';
        half.style.top = (h*HOUR_H + HOUR_H/2)+'px';
        col.appendChild(half);
      }
    }

    setupDropZone(col);
    cols.appendChild(col);
  });

  renderEvents();
  renderNowLine();
}

function renderEvents() {
  document.querySelectorAll('.event-block').forEach(e=>e.remove());
  const days = getDisplayDays();
  const dateStrs = days.map(toDateStr);

  state.events.forEach(ev => {
    if(!dateStrs.includes(ev.dateStr)) return;
    const col = document.querySelector(`.day-col[data-date-str="${ev.dateStr}"]`);
    if(!col) return;
    placeEventBlock(ev, col);
  });
}

function placeEventBlock(ev, col) {
  const startFrac = timeToFrac(ev.startTime);
  const endFrac = timeToFrac(ev.endTime);
  const dur = Math.max(endFrac - startFrac, 0.25);
  const top = startFrac * HOUR_H;
  const height = dur * HOUR_H;

  const color = catColor(ev.categoryId);
  const block = document.createElement('div');
  block.className = 'event-block';
  block.id = 'ev_' + ev.id;
  block.draggable = true;
  block.style.top = top + 'px';
  block.style.height = height + 'px';
  block.style.background = hexToRgba(color, 0.18);
  block.style.borderLeftColor = color;
  block.style.color = lighten(color);

  block.innerHTML = `
    <div class="event-top">
      <div class="event-cb" data-action="complete" title="Mark complete"></div>
      <div class="event-title">${ev.title}</div>
    </div>
    <div class="event-time">${fmtTime(ev.startTime)} – ${fmtTime(ev.endTime)}</div>
    ${ev.reminder?'<div class="reminder-badge">🔔</div>':''}
    <div class="event-actions">
      <button class="ev-btn" data-action="edit" title="Edit">✎</button>
      <button class="ev-btn" data-action="delete" title="Delete">✕</button>
    </div>
    <div class="resize-handle" data-id="${ev.id}"></div>
  `;

  block.querySelector('[data-action="edit"]').addEventListener('click', e=>{
    e.stopPropagation(); openAddModal(ev.id);
  });
  block.querySelector('[data-action="delete"]').addEventListener('click', e=>{
    e.stopPropagation(); deleteEvent(ev.id);
  });
  block.querySelector('[data-action="complete"]').addEventListener('click', e=>{
    e.stopPropagation();
    e.target.classList.add('checked');
    block.style.transition = 'opacity 0.25s';
    block.style.opacity = '0';
    setTimeout(()=> completeEvent(ev.id), 220);
  });

  setupEventDrag(block, ev);
  setupResizeDrag(block.querySelector('.resize-handle'), ev);
  col.appendChild(block);
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function lighten(hex) {
  const r = parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+100)},${Math.min(255,g+100)},${Math.min(255,b+100)})`;
}

function renderNowLine() {
  document.querySelectorAll('.now-line').forEach(e=>e.remove());
  const now = new Date();
  const todayStr = today();
  const col = document.querySelector(`.day-col[data-date-str="${todayStr}"]`);
  if(!col) return;
  const frac = now.getHours() + now.getMinutes()/60;
  const line = document.createElement('div');
  line.className = 'now-line';
  line.style.top = (frac * HOUR_H) + 'px';
  col.appendChild(line);
}

// ─── DRAG & DROP (events) ───────────────────────────────────────────────────
let dragState = null;

function setupEventDrag(block, ev) {
  block.addEventListener('dragstart', e => {
    dragState = { evId: ev.id, startY: e.clientY, origTop: parseFloat(block.style.top) };
    block.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', ev.id);
  });
  block.addEventListener('dragend', ()=>{
    block.classList.remove('dragging');
    document.querySelectorAll('.day-col.drag-over').forEach(c=>c.classList.remove('drag-over'));
    dragState = null;
  });
}

function setupDropZone(col) {
  col.addEventListener('dragover', e => {
    e.preventDefault();
    col.classList.add('drag-over');
    e.dataTransfer.dropEffect = 'move';
  });
  col.addEventListener('dragleave', ()=> col.classList.remove('drag-over'));
  col.addEventListener('drop', e => {
    e.preventDefault();
    col.classList.remove('drag-over');
    if(!dragState) return;
    const evId = e.dataTransfer.getData('text/plain');
    const ev = state.events.find(x=>x.id===evId);
    if(!ev) return;

    const rect = col.getBoundingClientRect();
    const relY = e.clientY - rect.top;
    let newStartFrac = relY / HOUR_H;
    newStartFrac = Math.round(newStartFrac * 4) / 4; // snap 15min
    newStartFrac = Math.max(0, Math.min(23.75, newStartFrac));

    const dur = timeToFrac(ev.endTime) - timeToFrac(ev.startTime);
    const newEndFrac = Math.min(24, newStartFrac + dur);

    const newDateStr = col.dataset.dateStr;
    ev.startTime = fracToHhmm(newStartFrac);
    ev.endTime = fracToHhmm(newEndFrac);
    ev.dateStr = newDateStr;

    save();
    renderEvents();
    renderUnscheduled();
    toast(`Moved to ${fmtTime(ev.startTime)}`, catColor(ev.categoryId));
  });

  // Click to create
  col.addEventListener('click', e=>{
    if(e.target !== col && !e.target.classList.contains('hour-line') && !e.target.classList.contains('half-line') && !e.target.classList.contains('now-line')) return;
    const rect = col.getBoundingClientRect();
    const relY = e.clientY - rect.top;
    let frac = relY / HOUR_H;
    frac = Math.round(frac * 4) / 4;
    openAddModal(null, col.dataset.dateStr, fracToHhmm(frac));
  });
}

// ─── RESIZE ─────────────────────────────────────────────────────────────────
function setupResizeDrag(handle, ev) {
  let startY, startEndFrac;
  handle.addEventListener('mousedown', e=>{
    e.stopPropagation(); e.preventDefault();
    startY = e.clientY;
    startEndFrac = timeToFrac(ev.endTime);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  function onMove(e) {
    const dy = e.clientY - startY;
    let newEnd = startEndFrac + dy/HOUR_H;
    newEnd = Math.round(newEnd*4)/4;
    newEnd = Math.max(timeToFrac(ev.startTime)+0.25, Math.min(24, newEnd));
    ev.endTime = fracToHhmm(newEnd);
    const block = document.getElementById('ev_'+ev.id);
    if(block){
      const dur = newEnd - timeToFrac(ev.startTime);
      block.style.height = (dur*HOUR_H)+'px';
      block.querySelector('.event-time').textContent = `${fmtTime(ev.startTime)} – ${fmtTime(ev.endTime)}`;
    }
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    save();
    renderEvents();
  }
}

// ─── MODAL ──────────────────────────────────────────────────────────────────
function openAddModal(evId=null, dateStr=null, startTime=null) {
  state.editingEventId = evId;
  const modal = document.getElementById('eventModal');
  const delBtn = document.getElementById('deleteEvBtn');
  const title = document.getElementById('modalTitle');
  populateCatSelect();

  if(evId) {
    const ev = state.events.find(e=>e.id===evId);
    if(!ev) return;
    title.textContent = 'Edit event';
    delBtn.style.display = 'block';
    document.getElementById('evTitle').value = ev.title;
    document.getElementById('evDate').value = ev.dateStr;
    document.getElementById('evStart').value = ev.startTime;
    document.getElementById('evEnd').value = ev.endTime;
    document.getElementById('evNotes').value = ev.notes||'';
    document.getElementById('evReminder').checked = !!ev.reminder;
    document.getElementById('evCategory').value = ev.categoryId || (state.categories[0]?.id||'');
  } else {
    title.textContent = 'New event';
    delBtn.style.display = 'none';
    document.getElementById('evTitle').value = '';
    document.getElementById('evDate').value = dateStr || today();
    document.getElementById('evStart').value = startTime || '09:00';
    const endH = startTime ? fracToHhmm(Math.min(24, timeToFrac(startTime)+1)) : '10:00';
    document.getElementById('evEnd').value = endH;
    document.getElementById('evNotes').value = '';
    document.getElementById('evReminder').checked = false;
    document.getElementById('evCategory').value = state.categories[0]?.id||'';
  }

  modal.classList.add('open');
  document.getElementById('evTitle').focus();
}

function populateCatSelect() {
  const sel = document.getElementById('evCategory');
  sel.innerHTML = state.categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
}

document.getElementById('closeModal').addEventListener('click', ()=> document.getElementById('eventModal').classList.remove('open'));
document.getElementById('cancelModal').addEventListener('click', ()=> document.getElementById('eventModal').classList.remove('open'));
document.getElementById('eventModal').addEventListener('click', e=>{ if(e.target===document.getElementById('eventModal')) document.getElementById('eventModal').classList.remove('open'); });

document.getElementById('saveEvent').addEventListener('click', ()=>{
  const title = document.getElementById('evTitle').value.trim();
  if(!title){ document.getElementById('evTitle').focus(); return; }
  const ev = {
    id: state.editingEventId || uid(),
    title,
    dateStr: document.getElementById('evDate').value,
    startTime: document.getElementById('evStart').value,
    endTime: document.getElementById('evEnd').value,
    notes: document.getElementById('evNotes').value.trim(),
    categoryId: document.getElementById('evCategory').value,
    reminder: document.getElementById('evReminder').checked,
  };
  if(state.editingEventId) {
    const idx = state.events.findIndex(e=>e.id===state.editingEventId);
    if(idx>=0) state.events[idx] = ev;
  } else {
    state.events.push(ev);
  }
  save();
  document.getElementById('eventModal').classList.remove('open');
  renderEvents();
  renderUnscheduled();
  renderCategories();
  toast(state.editingEventId ? 'Event updated' : 'Event added', catColor(ev.categoryId));
  if(ev.reminder) scheduleReminder(ev);
});

document.getElementById('deleteEvBtn').addEventListener('click', ()=>{
  if(!state.editingEventId) return;
  deleteEvent(state.editingEventId);
  document.getElementById('eventModal').classList.remove('open');
});

function deleteEvent(id) {
  state.events = state.events.filter(e=>e.id!==id);
  save();
  renderEvents();
  renderUnscheduled();
  renderCategories();
  toast('Event deleted', '#ff6b6b');
}

async function completeEvent(id) {
  const idx = state.events.findIndex(e=>e.id===id);
  if(idx<0) return;
  const [ev] = state.events.splice(idx,1);
  save();
  renderEvents();
  renderUnscheduled();
  renderCategories();
  toast(`"${ev.title}" completed`, '#22c97a');
  try {
    await fetch('/api/completed', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ event: { ...ev, completedAt: new Date().toISOString() } }),
    });
  } catch (e) {
    toast('Failed to archive completed event', '#ff6b6b');
  }
}

document.getElementById('openAddModal').addEventListener('click', ()=> openAddModal());

// ─── REMINDERS ──────────────────────────────────────────────────────────────
function scheduleReminder(ev) {
  const now = new Date();
  const evDate = new Date(ev.dateStr + 'T' + ev.startTime);
  const ms = evDate.getTime() - now.getTime() - 10*60*1000;
  if(ms > 0 && ms < 86400000) {
    setTimeout(()=>{
      toast(`⏰ Reminder: ${ev.title} starts in 10 min`, catColor(ev.categoryId));
    }, ms);
  }
}
function initReminders() {
  state.events.filter(e=>e.reminder).forEach(scheduleReminder);
}

// ─── CATEGORIES ──────────────────────────────────────────────────────────────
function renderCategories() {
  const list = document.getElementById('categoryList');
  list.innerHTML = '';
  state.categories.forEach(cat => {

    const div = document.createElement('div');
    div.className = 'category-item';
    div.innerHTML = `
      <div class="cat-dot" style="background:${cat.color}"></div>

    `;
    div.querySelector('.cat-delete').addEventListener('click', e=>{
      e.stopPropagation();
      state.categories = state.categories.filter(c=>c.id!==cat.id);

    });
    list.appendChild(div);
  });
}

document.getElementById('showCatForm').addEventListener('click', ()=>{

document.getElementById('addCatBtn').addEventListener('click', ()=>{

  state.categories.push({ id: uid(), name, color });
  document.getElementById('catNameInput').value = '';

document.getElementById('catNameInput').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('addCatBtn').click(); });

// ─── TODOS ──────────────────────────────────────────────────────────────────
function renderTodos() {
  const list = document.getElementById('todoList');
  list.innerHTML = '';
  state.todos.forEach(todo => {
    const div = document.createElement('div');
    div.className = 'todo-item';
    div.innerHTML = `

document.getElementById('addTodoBtn').addEventListener('click', ()=>{

});
document.getElementById('saveTodoBtn').addEventListener('click', ()=>{

document.getElementById('todoInput').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('saveTodoBtn').click(); });

// ─── HABIT TRACKER ──────────────────────────────────────────────────────────
const HABIT_PALETTE = ['#6c63ff','#22c97a','#f4a03c','#e05c99','#4ec9b0','#ffaa33','#5ec8ff'];

function habitWeekDays() {
  const ws = weekStart(state.habitWeekOffset); // independent of the main calendar's week nav
  return Array.from({length:7},(_,i)=>addDays(ws,i));
}

function updateHabitWeekLabel() {
  const days = habitWeekDays();
  const a = days[0], b = days[6];
  const fmt = d => d.toLocaleDateString('en-GB', {day:'numeric',month:'short'});
  document.getElementById('habitWeekLabel').textContent = `${fmt(a)} – ${fmt(b)}, ${b.getFullYear()}`;
}

function renderHabitGrid() {
  const table = document.getElementById('habitGrid');
  const days = habitWeekDays();
  const dayNames = ['Mo','Tu','We','Th','Fr','Sa','Su'];
  const todayStr = today();

  const thead = `<tr><th class="habit-name-col">Habit</th>${
    days.map((d,i)=>`<th class="${toDateStr(d)===todayStr?'today-col':''}">${dayNames[i]}<br>${d.getDate()}</th>`).join('')
  }</tr>`;

  const rows = state.habits.map(h => {
    const cells = days.map(d=>{
      const ds = toDateStr(d);
      const done = !!(state.habitLog[ds] && state.habitLog[ds][h.id]);
      return `<td class="${ds===todayStr?'today-col':''}"><div class="habit-day-cb${done?' checked':''}" data-habit="${h.id}" data-date="${ds}"></div></td>`;
    }).join('');
    return `<tr class="habit-row"><td class="habit-name-col"><span style="width:7px;height:7px;border-radius:50%;background:${h.color};display:inline-block;flex-shrink:0"></span>${h.name}<button class="habit-del" data-id="${h.id}" title="Remove">✕</button></td>${cells}</tr>`;
  }).join('');

  table.innerHTML = thead + rows;

  table.querySelectorAll('.habit-day-cb').forEach(cb=>{
    cb.addEventListener('click', ()=> toggleHabit(cb.dataset.date, cb.dataset.habit));
  });
  table.querySelectorAll('.habit-del').forEach(btn=>{
    btn.addEventListener('click', e=>{
      e.stopPropagation();
      state.habits = state.habits.filter(h=>h.id!==btn.dataset.id);
      saveHabits(); renderHabitGrid(); renderHabitChart(); renderHabitColChart();
    });
  });
}

function toggleHabit(dateStr, habitId) {
  if(!state.habitLog[dateStr]) state.habitLog[dateStr] = {};
  state.habitLog[dateStr][habitId] = !state.habitLog[dateStr][habitId];
  saveHabits();
  renderHabitGrid();
  renderHabitChart();
  renderHabitColChart();
}

function renderHabitChart() {
  const chart = document.getElementById('habitChart');
  const days = habitWeekDays().map(toDateStr);
  chart.innerHTML = state.habits.map(h=>{
    const doneCount = days.filter(ds=>state.habitLog[ds] && state.habitLog[ds][h.id]).length;
    const pct = Math.round((doneCount/7)*100);
    return `
      <div class="habit-chart-row">
        <div class="habit-chart-label">${h.name}</div>
        <div class="habit-chart-track"><div class="habit-chart-fill" style="width:${pct}%;background:${h.color}"></div></div>
        <div class="habit-chart-pct">${pct}%</div>
      </div>
    `;
  }).join('');
}

function habitMonthDate() {
  const d = new Date();
  d.setDate(1);
  d.setMonth(d.getMonth() + state.habitMonthOffset);
  return d;
}
function daysInMonth(d) {
  return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
}
function updateHabitMonthLabel() {
  const d = habitMonthDate();
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('habitMonthLabel').textContent = `${monthNames[d.getMonth()]} ${d.getFullYear()}`;
}

function renderHabitColChart() {
  const chart = document.getElementById('habitColChart');
  const md = habitMonthDate();
  const total = daysInMonth(md);
  const year = md.getFullYear(), month = md.getMonth();

  chart.innerHTML = state.habits.map(h=>{
    let done = 0;
    for(let day=1; day<=total; day++){
      const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      if(state.habitLog[ds] && state.habitLog[ds][h.id]) done++;
    }
    const pct = Math.round((done/total)*100);
    return `
      <div class="habit-col">
        <div class="habit-col-pct">${pct}%</div>
        <div class="habit-col-track"><div class="habit-col-fill" style="height:${pct}%;background:${h.color}"></div></div>
        <div class="habit-col-label">${h.name}</div>
      </div>
    `;
  }).join('');
}

function renderHabitPanel() {
  updateHabitWeekLabel();
  renderHabitGrid();
  renderHabitChart();
  updateHabitMonthLabel();
  renderHabitColChart();
}

function openHabitPanel() {
  document.getElementById('habitPanel').classList.add('open');
  document.getElementById('habitPanelBg').classList.add('open');
  renderHabitPanel();
}
function closeHabitPanel() {
  document.getElementById('habitPanel').classList.remove('open');
  document.getElementById('habitPanelBg').classList.remove('open');
}
document.getElementById('openHabitPanel').addEventListener('click', openHabitPanel);
document.getElementById('closeHabitPanel').addEventListener('click', closeHabitPanel);
document.getElementById('habitPanelBg').addEventListener('click', closeHabitPanel);

document.getElementById('habitPrevWeek').addEventListener('click', ()=>{ state.habitWeekOffset--; renderHabitPanel(); });
document.getElementById('habitNextWeek').addEventListener('click', ()=>{ state.habitWeekOffset++; renderHabitPanel(); });
document.getElementById('habitTodayBtn').addEventListener('click', ()=>{ state.habitWeekOffset = 0; renderHabitPanel(); });

document.getElementById('habitPrevMonth').addEventListener('click', ()=>{ state.habitMonthOffset--; updateHabitMonthLabel(); renderHabitColChart(); });
document.getElementById('habitNextMonth').addEventListener('click', ()=>{ state.habitMonthOffset++; updateHabitMonthLabel(); renderHabitColChart(); });
document.getElementById('habitThisMonthBtn').addEventListener('click', ()=>{ state.habitMonthOffset = 0; updateHabitMonthLabel(); renderHabitColChart(); });

document.getElementById('saveHabitBtn').addEventListener('click', ()=>{
  const name = document.getElementById('habitInput').value.trim();
  if(!name) return;
  const color = HABIT_PALETTE[state.habits.length % HABIT_PALETTE.length];
  state.habits.push({ id: uid(), name, color });
  document.getElementById('habitInput').value = '';
  saveHabits(); renderHabitGrid(); renderHabitChart(); renderHabitColChart();
});
document.getElementById('habitInput').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('saveHabitBtn').click(); });

document.getElementById('resetHabitBtn').addEventListener('click', async ()=>{
  if(!confirm('Clear all tracked habit history? Your habit list stays, but every day you\'ve checked off will be wiped. Use this at the start of a new year.')) return;
  state.habitLog = {};
  state.habitWeekOffset = 0;
  await saveHabits();
  renderHabitPanel();
  toast('Habit history cleared', '#ff6b6b');
});

// ─── UNSCHEDULED / OVERDUE ──────────────────────────────────────────────────
function renderUnscheduled() {
  const overdue = state.events.filter(ev => isOverdue(ev));
  const section = document.getElementById('unscheduledSection');
  const list = document.getElementById('unscheduledList');
  section.style.display = overdue.length ? 'block' : 'none';
  list.innerHTML = '';
  overdue.forEach(ev => {
    const chip = document.createElement('div');
    chip.className = 'unscheduled-chip';
    chip.draggable = true;
    chip.innerHTML = `
      <div class="chip-dot" style="background:${catColor(ev.categoryId)}"></div>
      <span class="chip-label">${ev.title}</span>
      <button class="chip-reschedule" data-id="${ev.id}">Reschedule →</button>
    `;
    chip.querySelector('.chip-reschedule').addEventListener('click', ()=>{
      openAddModal(ev.id);
    });
    chip.addEventListener('dragstart', e=>{
      dragState = { evId: ev.id };
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', ev.id);
    });
    list.appendChild(chip);
  });
}

// ─── MINI CALENDAR ──────────────────────────────────────────────────────────
function renderMiniCal() {
  const d = state.miniCalDate;
  const year = d.getFullYear(), month = d.getMonth();
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayNames = ['Mo','Tu','We','Th','Fr','Sa','Su'];

  const first = new Date(year, month, 1);
  const startDay = (first.getDay()+6)%7; // Mon=0
  const daysInMonth = new Date(year, month+1, 0).getDate();

  let html = `
    <div class="mini-cal-header">
      <button id="miniPrev">‹</button>
      <span>${monthNames[month]} ${year}</span>
      <button id="miniNext">›</button>
    </div>
    <div class="mini-cal-grid">
      ${dayNames.map(n=>`<div class="mini-cal-day-name">${n}</div>`).join('')}
  `;

  for(let i=0;i<startDay;i++) html += '<div class="mini-cal-day other-month"></div>';

  const todayStr = today();
  const ws = weekStart(state.weekOffset);
  const weekDays = Array.from({length:7},(_,i)=>toDateStr(addDays(ws,i)));
  const selectedDays = state.view === 'day' ? [state.dayViewDate] : weekDays;

  for(let d=1;d<=daysInMonth;d++){
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls = 'mini-cal-day';
    if(ds===todayStr) cls+=' today';
    else if(selectedDays.includes(ds)) cls+=' selected';
    html += `<div class="${cls}" data-date="${ds}">${d}</div>`;
  }
  html += '</div>';

  const mc = document.getElementById('miniCal');
  mc.innerHTML = html;
  mc.querySelectorAll('.mini-cal-day[data-date]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const ds = el.dataset.date;
      if(state.view === 'day') {
        state.dayViewDate = ds;
        render();
        return;
      }
      const [cy,cm,cd] = ds.split('-').map(Number);
      const clicked = new Date(cy, cm-1, cd);
      const base = weekStart(0);
      const days7 = 7*24*3600*1000;
      state.weekOffset = Math.floor((clicked.getTime() - base.getTime()) / days7);
      render();
    });
  });
  mc.querySelector('#miniPrev').addEventListener('click', ()=>{
    state.miniCalDate = new Date(year, month-1, 1); renderMiniCal();
  });
  mc.querySelector('#miniNext').addEventListener('click', ()=>{
    state.miniCalDate = new Date(year, month+1, 1); renderMiniCal();
  });
}

// ─── WEEK NAV ───────────────────────────────────────────────────────────────
function updateWeekLabel() {
  if(state.view === 'day') {
    const [y,m,d] = state.dayViewDate.split('-').map(Number);
    const day = new Date(y, m-1, d);
    document.getElementById('weekLabel').textContent = day.toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
    return;
  }
  const days = getWeekDays();
  const a = days[0], b = days[6];
  const fmt = d => d.toLocaleDateString('en-GB', {day:'numeric',month:'short'});
  document.getElementById('weekLabel').textContent = `${fmt(a)} – ${fmt(b)}, ${b.getFullYear()}`;
}

document.getElementById('prevWeek').addEventListener('click', ()=>{
  if(state.view === 'day') {
    const [y,m,d] = state.dayViewDate.split('-').map(Number);
    state.dayViewDate = toDateStr(addDays(new Date(y,m-1,d), -1));
  } else {
    state.weekOffset--;
  }
  render();
});
document.getElementById('nextWeek').addEventListener('click', ()=>{
  if(state.view === 'day') {
    const [y,m,d] = state.dayViewDate.split('-').map(Number);
    state.dayViewDate = toDateStr(addDays(new Date(y,m-1,d), 1));
  } else {
    state.weekOffset++;
  }
  render();
});
document.getElementById('todayBtn').addEventListener('click', ()=>{
  state.weekOffset = 0;
  state.dayViewDate = today();
  render();
});

document.querySelectorAll('.view-tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    state.view = tab.dataset.view;
    render();
  });
});

// ─── SCROLL TO BUSINESS HOURS ───────────────────────────────────────────────
function scrollToNow() {
  const wrap = document.getElementById('timeGridWrap');
  const now = new Date();
  const frac = now.getHours() + now.getMinutes()/60;
  wrap.scrollTop = Math.max(0, frac * HOUR_H - 120);
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function render() {
  updateWeekLabel();
  renderDayHeaders();
  renderTimeGrid();
  renderCategories();
  renderTodos();
  renderUnscheduled();
  renderMiniCal();
}

// ─── KEYBOARD SHORTCUTS ──────────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') { document.getElementById('eventModal').classList.remove('open'); closeHabitPanel(); }
  if(e.key==='n' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName!=='INPUT' && document.activeElement.tagName!=='TEXTAREA' && !document.activeElement.contentEditable==='true') {
    openAddModal();
  }
  if(e.key==='ArrowLeft' && e.altKey) { document.getElementById('prevWeek').click(); }
  if(e.key==='ArrowRight' && e.altKey) { document.getElementById('nextWeek').click(); }
});

// ─── NOW LINE AUTO-UPDATE ─────────────────────────────────────────────────────
setInterval(()=>{ renderNowLine(); }, 60000);

// ─── INIT ────────────────────────────────────────────────────────────────────
async function init() {
  await load();
  await loadHabits();
  render();
  scrollToNow();
  initReminders();

  // Seed default habits if empty
  if(state.habits.length === 0) {
    state.habits = DEFAULT_HABITS.map(h=>({...h}));
    await saveHabits();
  }

  // Seed demo events if empty
  if(state.events.length === 0) {
    const t = today();
    state.events = [
      { id: uid(), title: 'Team standup', dateStr: t, startTime: '09:00', endTime: '09:30', categoryId: state.categories[0].id, reminder: true, notes: '' },
      { id: uid(), title: 'Deep work block', dateStr: t, startTime: '10:00', endTime: '12:00', categoryId: state.categories[0].id, reminder: false, notes: '' },
      { id: uid(), title: 'Lunch + walk', dateStr: t, startTime: '12:30', endTime: '13:30', categoryId: state.categories[1].id, reminder: false, notes: '' },
      { id: uid(), title: 'Read — 30 pages', dateStr: t, startTime: '20:00', endTime: '21:00', categoryId: state.categories[4].id, reminder: true, notes: '' },
    ];
    await save();
    renderEvents();
  }
}
init();
